<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Gateway - CodeQuest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
</head>
<body>

    <div class="container">
        <div class="row align-items-center justify-content-center" style="min-height: 100vh;">
            <div class="col-md-6 col-lg-4 animate-fade-in">
                <div class="glass-panel p-5 text-center border-primary" style="box-shadow: 0 10px 40px rgba(99, 102, 241, 0.15);">
                    <i class="fa-solid fa-shield-halved mb-3" style="font-size: 3.5rem; color: var(--brand-primary);"></i>
                    <h2 class="font-brand fw-bold mb-1">Admin <span class="text-gradient">Gateway</span></h2>
                    <p class="text-muted mb-4 small">Restricted System Access</p>
                    
                    <form id="adminAuthForm">
                        <input type="email" class="form-control form-stitch mb-3" id="adminEmail" placeholder="Admin Email" required>
                        <input type="password" class="form-control form-stitch mb-4" id="adminPassword" placeholder="Master Password" required>
                        <button type="submit" class="btn-stitch w-100" id="btnAdminLogin">Authenticate <i class="fa-solid fa-terminal ms-2"></i></button>
                    </form>
                    
                    <div id="adminAuthMsg" class="mt-3 fw-bold small"></div>
                    <a href="index.html" class="d-block mt-4 text-muted small text-decoration-none"><i class="fa-solid fa-arrow-left me-1"></i> Return to Student Portal</a>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('adminAuthForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnAdminLogin');
            const msg = document.getElementById('adminAuthMsg');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';
            btn.disabled = true;

            const em = document.getElementById('adminEmail').value;
            const pw = document.getElementById('adminPassword').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email: em, password: pw });
            
            if (error) {
                msg.textContent = error.message; msg.className = "mt-3 fw-bold small text-danger";
                btn.innerHTML = 'Authenticate <i class="fa-solid fa-terminal ms-2"></i>'; btn.disabled = false; return;
            }

            const { data: profile } = await supabase.from('profiles').select('role').eq('id', data.user.id).single();
            if(profile && profile.role === 'admin') {
                msg.textContent = "Authorized. Accessing terminal...";
                msg.className = "mt-3 fw-bold small text-success";
                // Don't need manual redirect. App.js listens to ON_AUTH_SIGN_IN and enforceRouting() will boot them to admin.html instantly!
            } else {
                await supabase.auth.signOut();
                msg.textContent = "Reject: Substandard clearance level detected.";
                msg.className = "mt-3 fw-bold small text-danger";
                btn.innerHTML = 'Authenticate <i class="fa-solid fa-terminal ms-2"></i>'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
